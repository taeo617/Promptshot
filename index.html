<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="애플 스타일의 세련된 유리 질감(Glassmorphism) 인터랙티브 테스트 웹사이트">
  <title>Promptshot - Glassmorphic Test Center</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js"></script>
</head>
<body>

  <!-- Floating animated background blobs -->
  <div class="bg-container" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Apple-Style Status Bar -->
  <header class="status-bar">
    <div class="status-bar-left">
      <!-- Apple Logo Mock SVG -->
      <svg class="logo-icon" width="16" height="16" viewBox="0 0 170 170" fill="currentColor">
        <path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.17-14.34-3.17-4.58 0-9.49 1.05-14.75 3.17-5.26 2.13-9.5 3.24-12.74 3.35-4.39.13-9.13-1.85-14.21-5.93-3.07-2.49-6.83-7.06-11.29-13.72-4.87-7.25-9.04-16.14-12.49-26.66-3.46-10.51-5.19-20.91-5.19-31.2 0-14.8 3.82-26.85 11.45-36.16 7.64-9.31 16.92-13.97 27.86-13.97 4.96 0 10.15 1.25 15.58 3.75 5.43 2.5 9.07 3.75 10.92 3.75 1.6 0 5.11-1.25 10.54-3.75 5.43-2.5 10.23-3.67 14.42-3.5 13.47.42 24.1 5.42 31.9 14.97-11.53 7.02-17.18 16.71-16.97 29.07.21 9.85 3.86 17.91 10.96 24.2 7.1 6.28 15.42 9.53 24.96 9.75-.42 2.74-1.24 5.75-2.45 9.04zm-33.17-108.38c0-7.85 2.78-15.11 8.35-21.78 6.78-8.1 15.02-12.39 24.7-12.87.13.93.2 1.77.2 2.53 0 7.51-2.92 14.77-8.77 21.78-5.85 7.01-13.71 11.53-23.57 11.53-.6 0-1.24-.07-1.91-.2-.67-.13-1.01-.2-1.01-.2z"/>
      </svg>
      <span style="font-weight: 700; color: var(--text-primary);">Promptshot</span>
      <span class="status-item" style="opacity: 0.75;">개발자 센터</span>
    </div>
    
    <div class="status-bar-right">
      <!-- Wifi icon -->
      <div class="status-item" id="status-wifi">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
          <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"></line>
        </svg>
      </div>
      <!-- Battery icon -->
      <div class="status-item">
        <span style="font-size: 0.75rem; font-weight: 600; margin-right: 0.2rem;">88%</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="16" height="10" rx="2" ry="2"></rect>
          <line x1="22" y1="11" x2="22" y2="13"></line>
        </svg>
      </div>
      <!-- Live Clock -->
      <div class="status-item" id="live-clock" style="font-variant-numeric: tabular-nums;">
        00:00:00
      </div>
    </div>
  </header>

  <!-- Dynamic Theme toggle panel -->
  <div class="theme-toggle-wrapper">
    <button class="theme-toggle-btn" id="theme-toggle" aria-label="다크 모드와 라이트 모드 테마 변경">
      <!-- Theme Icon -->
      <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <span id="theme-text">라이트 모드</span>
    </button>
  </div>

  <!-- Main Grid Layout -->
  <main class="dashboard-grid">

    <!-- Card 1: Control Center -->
    <section class="glass-card" id="control-center-card">
      <div class="card-header">
        <div>
          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
              <line x1="15" y1="3" x2="15" y2="21"></line>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="3" y1="15" x2="21" y2="15"></line>
            </svg>
            <span>제어 센터</span>
          </h2>
          <p class="card-subtitle">시스템 핵심 설정 및 토글</p>
        </div>
      </div>

      <!-- Quick Toggles -->
      <div class="control-grid">
        <!-- Wi-Fi Toggle -->
        <button class="toggle-button" id="wifi-toggle" role="switch" aria-checked="true" aria-label="와이파이 스위치">
          <div class="toggle-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
              <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
              <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
              <line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"></line>
            </svg>
          </div>
          <span class="toggle-label">Wi-Fi</span>
          <span class="toggle-state" id="wifi-status-text">연결됨</span>
        </button>

        <!-- Bluetooth Toggle -->
        <button class="toggle-button" id="bluetooth-toggle" role="switch" aria-checked="true" aria-label="블루투스 스위치">
          <div class="toggle-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="m7 7 10 10-5 5V2l5 5L7 17"></path>
            </svg>
          </div>
          <span class="toggle-label">Bluetooth</span>
          <span class="toggle-state" id="bluetooth-status-text">켜짐</span>
        </button>

        <!-- AirDrop Toggle -->
        <button class="toggle-button" id="airdrop-toggle" role="switch" aria-checked="false" aria-label="에어드랍 스위치">
          <div class="toggle-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 11 12 6 7 11"></polyline>
              <polyline points="17 18 12 13 7 18"></polyline>
            </svg>
          </div>
          <span class="toggle-label">AirDrop</span>
          <span class="toggle-state" id="airdrop-status-text">꺼짐</span>
        </button>

        <!-- DND Toggle -->
        <button class="toggle-button" id="dnd-toggle" role="switch" aria-checked="false" aria-label="방해금지 모드 스위치">
          <div class="toggle-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </div>
          <span class="toggle-label">방해금지</span>
          <span class="toggle-state" id="dnd-status-text">꺼짐</span>
        </button>
      </div>

      <!-- Brightness Slider -->
      <div class="slider-container">
        <div class="slider-label-group">
          <span id="brightness-label">화면 밝기</span>
          <span id="brightness-value">70%</span>
        </div>
        <div class="slider-wrapper" style="--value-percent: 70%;">
          <svg class="slider-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
          </svg>
          <input type="range" class="custom-slider" id="brightness-slider" min="10" max="100" value="70" aria-labelledby="brightness-label">
          <div class="slider-fill" id="brightness-fill"></div>
        </div>
      </div>

      <!-- Volume Slider -->
      <div class="slider-container">
        <div class="slider-label-group">
          <span id="volume-label">시스템 음량</span>
          <span id="volume-value">55%</span>
        </div>
        <div class="slider-wrapper" style="--value-percent: 55%;">
          <svg class="slider-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
          <input type="range" class="custom-slider" id="volume-slider" min="0" max="100" value="55" aria-labelledby="volume-label">
          <div class="slider-fill" id="volume-fill"></div>
        </div>
      </div>
    </section>

    <!-- Card 2: Performance Dashboard -->
    <section class="glass-card" id="performance-card">
      <div class="card-header">
        <div>
          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span>성능 모니터</span>
          </h2>
          <p class="card-subtitle">실시간 로드 상태 시각화</p>
        </div>
      </div>

      <!-- Performance Chart Space -->
      <div class="chart-container">
        <canvas id="performance-chart" aria-label="CPU 실시간 사용량 그래프" role="img"></canvas>
      </div>

      <!-- System Stats -->
      <div class="stats-list">
        <!-- CPU Stat -->
        <div class="stat-row">
          <div class="stat-info">
            <div class="stat-bullet cpu" aria-hidden="true"></div>
            <span class="stat-name">CPU 사용률</span>
          </div>
          <span class="stat-number" id="cpu-percent">00%</span>
        </div>

        <!-- RAM Stat -->
        <div class="stat-row">
          <div class="stat-info">
            <div class="stat-bullet ram" aria-hidden="true"></div>
            <span class="stat-name">시스템 메모리 (RAM)</span>
          </div>
          <span class="stat-number" id="ram-percent">62%</span>
        </div>

        <!-- Storage Stat -->
        <div class="stat-row">
          <div class="stat-info">
            <div class="stat-bullet storage" aria-hidden="true"></div>
            <span class="stat-name">저장공간 활용도</span>
          </div>
          <span class="stat-number" id="storage-percent">45%</span>
        </div>
      </div>
    </section>

  </main>

  <!-- Bottom Floating Magnified Dock -->
  <footer class="dock-container">
    <nav class="dock" id="dock" aria-label="메인 애플리케이션 독">
      
      <!-- Finder Item -->
      <button class="dock-item" aria-label="Finder">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        <span class="dock-tooltip">Finder</span>
        <div class="dock-indicator"></div>
      </button>

      <!-- Browser Item -->
      <button class="dock-item" aria-label="Safari 브라우저">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
        </svg>
        <span class="dock-tooltip">Safari</span>
        <div class="dock-indicator"></div>
      </button>

      <!-- Terminal Item -->
      <button class="dock-item" aria-label="터미널">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 17 10 11 4 5"></polyline>
          <line x1="12" y1="19" x2="20" y2="19"></line>
        </svg>
        <span class="dock-tooltip">Terminal</span>
      </button>

      <!-- System Preferences -->
      <button class="dock-item" aria-label="시스템 환경설정">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span class="dock-tooltip">Settings</span>
      </button>

    </nav>
  </footer>

</body>
</html>
